name: SQLMesh Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

jobs:
  sqlmesh:
    runs-on: ubuntu-latest
    env:
      SQLMESH_HOME: ${{ github.workspace }}/.sqlmesh_home
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlmesh duckdb pytest

      - name: Fetch NYC Taxi raw data
        run: python scripts/fetch_nyc_taxi_data.py --months 2

      - name: Run unit tests
        run: pytest -q

      - name: Run SQLMesh tests
        run: sqlmesh test

      - name: Plan and auto-apply to prod environment
        run: sqlmesh plan --auto-apply

      - name: Validate output row counts
        run: |
          python - <<'PYTHON'
          import duckdb

          con = duckdb.connect('data/warehouse.db')
          row = con.execute(
              'select count(*) from warehouse.taxi.fct_yellow_trip_daily'
          ).fetchone()
          print(f'fct_yellow_trip_daily rows: {row[0]}')
          PYTHON
